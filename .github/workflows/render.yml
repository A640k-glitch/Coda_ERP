name: Render Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Web Service Deployment Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "ERROR: RENDER_DEPLOY_HOOK_URL secret is not configured in GitHub Repository Secrets."
            exit 1
          fi
          echo "Triggering Render deployment..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deployment hook successfully called."
